<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="1 LOGO 3D.png">
    <link rel="apple-touch-icon" href="1 LOGO 3D.png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <title>ADMIN | HEA AUDIT SYSTEM</title>
    <style>
        :root {
            --pnp-blue: #000b1a;
            --pnp-gold: #d4af37;
            --audit-red: #ff3c3c;
            --interface-bg: #02060c;
            --terminal-green: #00ff9d;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; 
            width: 100vw; 
            background-color: var(--interface-bg);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0; 
            overflow: hidden; 
            position: fixed; 
        }

        /* --- THE BOOT TERMINAL --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .scan-ring {
            position: absolute;
            width: 220px; height: 220px;
            border: 2px solid transparent;
            border-top: 2px solid var(--audit-red);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        /* --- MAIN INTERFACE GRID --- */
        .main-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100dvh;
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        body.ready .main-container { opacity: 1; }
        body.ready #boot-screen { opacity: 0; pointer-events: none; }

        /* Admin Sidebar */
        .sidebar {
            background: linear-gradient(180deg, rgba(4, 12, 24, 0.98) 0%, rgba(2, 6, 12, 1) 100%);
            border-right: 1px solid rgba(255, 60, 60, 0.2);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-badge {
            border: 1px solid var(--audit-red);
            padding: 5px;
            text-align: center;
            font-family: 'Share Tech Mono';
            font-size: 10px;
            color: var(--audit-red);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Content Area */
        .document-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 12px;
            position: relative;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            padding: 0 5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 10px;
        }

        .doc-label { font-size: 9px; color: var(--audit-red); letter-spacing: 2px; font-weight: 700; }
        .doc-title { font-weight: 900; font-size: 16px; letter-spacing: 1px; color: #fff; }

        /* The Frame Container */
        .content-chassis {
            flex: 1;
            background: #fff;
            border-radius: 2px;
            position: relative;
            border: 2px solid #1a1e26;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Tactical Decoration */
        .corner { position: absolute; width: 15px; height: 15px; border: 3px solid var(--audit-red); z-index: 5; pointer-events: none; }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- MOBILE REFINEMENTS --- */
        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .document-area { padding: 6px; }
            .doc-title { font-size: 13px; }
            .doc-label { font-size: 8px; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="scan-ring"></div>
        <div class="boot-content" style="text-align: center;">
            <img src="1 LOGO 3D.png" style="width: 100px; filter: grayscale(1) brightness(1.5);" alt="PNP">
            <div id="status" style="font-family: 'Share Tech Mono'; color: var(--audit-red); font-size: 11px; letter-spacing: 4px; margin-top: 20px;">
                INITIALIZING ADMIN OVERRIDE...
            </div>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <div style="text-align: center; margin-bottom: 10px;">
                <img src="1 LOGO 3D.png" style="width: 70px;">
                <div style="font-weight: 900; color: #fff; font-size: 16px; margin-top: 10px;">RPRMD-IX</div>
                <div class="admin-badge">Clearance: Level 4</div>
            </div>

            <div style="font-family: 'Share Tech Mono'; font-size: 11px; border-left: 3px solid var(--audit-red); padding: 15px; background: rgba(255,0,0,0.05);">
                <span style="color:var(--audit-red)">SYSTEM:</span> HEA DASHBOARD<br>
                <span style="color:var(--audit-red)">AUTH:</span> ADMINISTRATOR<br>
                <span style="color:var(--audit-red)">SEC:</span> ENCRYPTED_SSL
            </div>

            <div style="margin-top: auto; font-family: 'Share Tech Mono'; font-size: 10px; color: rgba(255,255,255,0.4);">
                &copy; 2024 PNP RPRMD-IX <br>
                DATA PRIVACY ACT COMPLIANT
            </div>
        </aside>

        <main class="document-area">
            <header class="top-nav">
                <div>
                    <div class="doc-label">ADMINISTRATIVE COMMAND CENTER</div>
                    <div class="doc-title">HIGHEST EDUCATIONAL ATTAINMENT AUDIT</div>
                </div>
                <div style="text-align: right;">
                    <div id="clock" style="font-family: 'Share Tech Mono'; font-size: 14px; color: var(--audit-red); font-weight: bold;">00:00:00</div>
                    <div style="font-family: 'Share Tech Mono'; font-size: 9px; color: var(--pnp-gold);">LIVE SYSTEM FEED</div>
                </div>
            </header>

            <div class="content-chassis">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                
                <iframe 
                    src="https://script.google.com/macros/s/AKfycbyDBjIuQnzqRGXF9c82HUuZ-xo4N0IaD04GA0SrtgwP33vPqn6g1EP6Wm3hO3cNhRCB/exec?page=AdminDashboard" 
                    allow="geolocation; microphone; camera">
                </iframe>
            </div>
        </main>
    </div>

    <script>
        // Admin Boot Logic
        window.addEventListener('load', () => {
            const status = document.getElementById('status');
            const messages = [
                "AUTHENTICATING...", 
                "DECRYPTING DATABASE...", 
                "LOADING COMMAND MODULE...", 
                "ACCESS GRANTED"
            ];
            let i = 0;
            const interval = setInterval(() => {
                if(i < messages.length) { 
                    status.innerText = messages[i++]; 
                } else { 
                    clearInterval(interval);
                    document.body.classList.add('ready');
                }
            }, 600);
        });

        // Live Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
