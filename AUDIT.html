<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="1 LOGO 3D.png">
    <link rel="apple-touch-icon" href="1 LOGO 3D.png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <title>PRO9 RPRMD | HEA AUDIT</title>
    <style>
        :root {
            --pnp-blue: #000b1a;
            --pnp-gold: #d4af37;
            --audit-red: #ff3c3c;
            --interface-bg: #010409;
            --terminal-green: #00ff9d;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; 
            height: 100dvh; 
            width: 100vw; 
            background-color: var(--interface-bg);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0; 
            overflow: hidden; 
            position: fixed; 
        }

        /* --- LOADING OVERLAY --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-out;
        }

        .scan-ring {
            position: absolute;
            width: 160px; height: 160px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--pnp-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* --- MAIN MOBILE UI --- */
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        body.ready .main-container { opacity: 1; }
        body.ready #boot-screen { opacity: 0; pointer-events: none; }

        /* Header Area optimized for small screens */
        .mobile-header {
            padding: 10px 15px;
            background: linear-gradient(180deg, var(--pnp-blue) 0%, #010409 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .brand-box { display: flex; align-items: center; gap: 10px; }
        .brand-logo { width: 35px; height: 35px; }
        
        .title-group { line-height: 1.1; }
        .doc-label { font-size: 7px; color: var(--pnp-gold); letter-spacing: 1.5px; text-transform: uppercase; }
        .doc-title { font-weight: 900; font-size: 11px; letter-spacing: 0.5px; color: #fff; }

        #clock { 
            font-family: 'Share Tech Mono'; 
            font-size: 11px; 
            color: var(--pnp-gold); 
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* The Form Container - Maximized */
        .form-viewport {
            flex-grow: 1;
            position: relative;
            background: #f0f0f0; /* Standard form background color */
            margin: 5px;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Tactical HUD Decorations */
        .corner { position: absolute; width: 10px; height: 10px; border: 2px solid var(--pnp-gold); z-index: 10; pointer-events: none; }
        .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Hide Sidebar on Mobile */
        .sidebar-desktop { display: none; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="scan-ring"></div>
        <img src="1 LOGO 3D.png" style="width: 80px; position: relative; z-index: 10;" alt="PNP">
        <div id="status" style="font-family: 'Share Tech Mono'; color: var(--pnp-gold); font-size: 9px; letter-spacing: 2px; margin-top: 25px;">
            INITIALIZING SECURE LINK...
        </div>
    </div>

    <div class="main-container">
        <header class="mobile-header">
            <div class="brand-box">
                <img src="1 LOGO 3D.png" class="brand-logo" alt="LOGO">
                <div class="title-group">
                    <div class="doc-label">RPRMD-IX AUDIT</div>
                    <div class="doc-title">HEA DATA ENTRY</div>
                </div>
            </div>
            <div id="clock">00:00:00</div>
        </header>

        <main class="form-viewport">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            
            <iframe 
                src="https://script.google.com/macros/s/AKfycbza978OY7sYJPjy4fVqCDuz0fgPNEWC-4CKJ465IhAGnxYpFwzyAHCOfXNGoyqM5b-8/exec" 
                allow="geolocation; microphone; camera">
                Loading encrypted form...
            </iframe>
        </main>
    </div>

    <script>
        // Smooth transition from boot to form
        window.addEventListener('load', () => {
            const status = document.getElementById('status');
            const messages = ["ESTABLISHING UPLINK...", "SYSTEM READY"];
            let i = 0;
            const interval = setInterval(() => {
                if(i < messages.length) { 
                    status.innerText = messages[i++]; 
                } else { 
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.classList.add('ready');
                    }, 300);
                }
            }, 600);
        });

        // Compact Clock
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
